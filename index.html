<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>明星风采展示 - 首页</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 头部 -->
  <header>
    <div class="container header-content">
      <div class="logo"><i class="fas fa-star"></i> 明星风采</div>
      <nav>
        <ul>
          <li><a href="index.html" class="nav-link active">首页</a></li>
          <li><a href="star.html?star=li" class="nav-link">明星简介</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="title-section">
      <h1>明星风采展示</h1>
      <p>选择您想了解的明星，查看他们的详细信息和精彩瞬间</p>
    </section>

    <section class="selector-section">
      <div class="selector-card">
        <h2><i class="fas fa-search"></i> 选择明星</h2>

        <div class="select-container">
          <div class="input-group">
            <label for="star-select"><i class="fas fa-user"></i> 选择明星：</label>
            <select id="star-select" class="star-select">
              <option value="">-- 请选择明星 --</option>
              <option value="li">李荣浩</option>
              <option value="song">宋雨琦</option>
              <option value="tian">田曦薇</option>
              <option value="xue">薛之谦</option>
            </select>

            <button id="view-btn" class="view-btn">
              <i class="fas fa-eye"></i> 查看详情
            </button>
          </div>
          <p class="input-hint">提示：选择明星后点击“查看详情”</p>
        </div>

        <div class="star-options">
          <div class="star-option" data-star="li">
            <img src="photos/li1.jpg" alt="李荣浩">
            <span>李荣浩</span>
          </div>
          <div class="star-option" data-star="song">
            <img src="photos/song1.jpg" alt="宋雨琦">
            <span>宋雨琦</span>
          </div>
          <div class="star-option" data-star="tian">
            <img src="photos/tian1.jpg" alt="田曦薇">
            <span>田曦薇</span>
          </div>
          <div class="star-option" data-star="xue">
            <img src="photos/xue1.jpg" alt="薛之谦">
            <span>薛之谦</span>
          </div>
        </div>
      </div>
    </section>

    <section class="features-section">
      <h2><i class="fas fa-info-circle"></i> 网站功能</h2>
      <div class="features-grid">
        <div class="feature">
          <div class="feature-icon"><i class="fas fa-user-circle"></i></div>
          <h3>明星档案</h3>
          <p>查看明星的详细个人信息、职业经历和代表作品</p>
        </div>
        <div class="feature">
          <div class="feature-icon"><i class="fas fa-comments"></i></div>
          <h3>粉丝留言</h3>
          <p>为您喜爱的明星留言，与其他粉丝互动交流</p>
        </div>
        <div class="feature">
          <div class="feature-icon"><i class="fas fa-images"></i></div>
          <h3>图片展示</h3>
          <p>欣赏明星的高清照片，点击可查看大图</p>
        </div>
        <div class="feature">
          <div class="feature-icon"><i class="fas fa-mobile-alt"></i></div>
          <h3>响应式设计</h3>
          <p>在手机、平板和电脑上都能获得最佳浏览体验</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p>&copy; 2025 明星风采展示网站 - 网页设计大作业</p>
        <p>智科241_潘波_202431990425</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const starSelect = document.getElementById('star-select');
      const viewBtn = document.getElementById('view-btn');
      const starOptions = document.querySelectorAll('.star-option');

      viewBtn.addEventListener('click', function () {
        const id = starSelect.value;
        if (!id) return alert('请先选择一位明星！');
        window.location.href = `star.html?star=${id}`;
      });

      starOptions.forEach(opt => {
        opt.addEventListener('click', function () {
          const id = this.getAttribute('data-star');
          starSelect.value = id;
          window.location.href = `star.html?star=${id}`;
        });
      });
    });
  </script>
</body>
</html>
