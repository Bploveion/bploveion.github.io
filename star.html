<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>明星简介 - 明星风采展示</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        <a href="index.html" style="color:white;text-decoration:none;">
          <i class="fas fa-star"></i> 明星风采
        </a>
      </div>
      <nav>
        <ul>
          <li><a href="index.html" class="nav-link">首页</a></li>
          <li><a href="#" class="nav-link active">明星简介</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="star-navigation">
      <a href="star.html?star=li" class="star-nav-btn">李荣浩</a>
      <a href="star.html?star=song" class="star-nav-btn">宋雨琦</a>
      <a href="star.html?star=tian" class="star-nav-btn">田曦薇</a>
      <a href="star.html?star=xue" class="star-nav-btn">薛之谦</a>
    </div>

    <div id="star-content">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载明星信息中...</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p>&copy; 2025 明星风采展示网站 - 网网页设计大作业</p>
      </div>
    </div>
  </footer>

  <!-- 图片弹窗 -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" title="关闭">&times;</span>
      <div class="modal-nav prev" title="上一张"></div>
      <div class="modal-nav next" title="下一张"></div>
      <img id="modalImage" src="" alt="大图预览">
      <div id="modalCaption"></div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      let starId = urlParams.get('star') || 'li';


      let comments = [];

      const starData = {
        li: {
          name: '李荣浩',
          title: '中国内地男歌手、音乐制作人、吉他手',
          birthday: '1985年7月11日',
          birthplace: '安徽省蚌埠市',
          achievement: '第25届金曲奖最佳新人奖',
          tags: ['歌手', '音乐制作人', '作曲家', '吉他手'],
          intro: '李荣浩，中国内地流行乐男歌手、词曲创作人、音乐制作人、演员。2013年发行个人首张原创专辑《模特》，凭借该专辑获得第25届金曲奖最佳新人奖，实现了从制作人到歌手的转型。',
          works: ['《模特》 (2013)', '《李白》 (2013)', '《年少有为》 (2018)', '《麻雀》 (2020)', '《不将就》 (2016)'],
          images: [
            { src: 'photos/li1.jpg', desc: '个人演唱会' },
            { src: 'photos/li2.jpg', desc: '舞台演出' },
            { src: 'photos/li3.jpg', desc: '音乐创作' },
            { src: 'photos/li4.jpg', desc: '表演瞬间' }
          ]
        },
        song: {
          name: '宋雨琦',
          title: '中国内地女歌手、舞者，(G)I-DLE组合成员',
          birthday: '1999年9月23日',
          birthplace: '北京市',
          achievement: '(G)I-DLE组合成员',
          tags: ['歌手', '舞者', '偶像', '综艺人'],
          intro: '宋雨琦，中国内地女歌手、舞者，韩国女子演唱组合(G)I-DLE成员。2018年随组合发行首张专辑《I am》正式出道。',
          works: ['《LATATA》 (2018)', '《HANN (Alone)》 (2018)', '《Senorita》 (2019)', '《Oh my god》 (2020)', '《火花》 (2021)'],
          images: [
            { src: 'photos/song1.jpg', desc: '个人写真' },
            { src: 'photos/song2.jpg', desc: '自然感受' },
            { src: 'photos/song3.jpg', desc: '时尚大片' },
            { src: 'photos/song4.jpg', desc: '生活美照' }
          ]
        },
        tian: {
          name: '田曦薇',
          title: '中国内地影视女演员',
          birthday: '1997年10月14日',
          birthplace: '重庆市',
          achievement: '新生代演员代表',
          tags: ['演员', '影视明星', '时尚偶像', '新生代'],
          intro: '田曦薇，中国内地影视女演员，出生于重庆市。因出演多部热门影视剧而受到关注，凭借清新形象赢得观众喜爱。',
          works: ['《如此可爱的我们》 (2020)', '《我的宠物少将军》 (2021)', '《初次爱你》 (2022)', '《田耕纪》 (2023)'],
          images: [
            { src: 'photos/tian1.jpg', desc: '个人肖像' },
            { src: 'photos/tian2.jpg', desc: '影尚写真' },
            { src: 'photos/tian3.jpg', desc: '影视剧照' },
            { src: 'photos/tian4.jpg', desc: '活动现场' }
          ]
        },
        xue: {
          name: '薛之谦',
          title: '中国内地男歌手、音乐制作人、演员',
          birthday: '1983年7月17日',
          birthplace: '上海市',
          achievement: '音乐风云榜最佳男歌手',
          tags: ['歌手', '音乐人', '段子手', '演员'],
          intro: '薛之谦，中国内地男歌手、音乐制作人、演员。代表作品有《演员》《丑八怪》《你还要我怎样》等。',
          works: ['《认真的雪》 (2006)', '《演员》 (2015)', '《丑八怪》 (2013)', '《你还要我怎样》 (2013)', '《刚刚好》 (2016)'],
          images: [
            { src: 'photos/xue1.jpg', desc: '个人写真' },
            { src: 'photos/xue2.jpg', desc: '演唱会现场' },
            { src: 'photos/xue3.jpg', desc: '绘画写真' },
            { src: 'photos/xue4.jpg', desc: '音乐创作' }
          ]
        }
      };

      function loadStarInfo() {
        const star = starData[starId] || starData.li;
        document.title = `${star.name} - 明星风采展示`;

        // 激活导航按钮
        document.querySelectorAll('.star-nav-btn').forEach(btn => {
          btn.textContent.includes(star.name) ? btn.classList.add('active') : btn.classList.remove('active');
        });

        const starContent = document.getElementById('star-content');
        starContent.innerHTML = `
          <div class="star-display">
            <div class="star-header">
              <div class="star-main-info">
                <img src="${star.images[0].src}" alt="${star.name}" class="star-avatar" id="main-star-img">
                <div class="star-text-info">
                  <h2>${star.name}</h2>
                  <p class="star-title">${star.title}</p>
                  <div class="star-tags">
                    ${star.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                  </div>
                </div>
              </div>
              <div class="star-basic-info">
                <div class="info-item"><i class="fas fa-birthday-cake"></i><span>出生日期：${star.birthday}</span></div>
                <div class="info-item"><i class="fas fa-map-marker-alt"></i><span>出生地：${star.birthplace}</span></div>
                <div class="info-item"><i class="fas fa-trophy"></i><span>主要成就：${star.achievement}</span></div>
              </div>
            </div>

            <div class="star-content">
              <h3><i class="fas fa-user"></i> 个人简介</h3>
              <p>${star.intro}</p>

              <h3><i class="fas fa-images"></i> 精彩瞬间</h3>
              <div class="star-gallery" id="gallery">
                ${star.images.map(img => `
                  <div class="gallery-item">
                    <img src="${img.src}" alt="${star.name} - ${img.desc}">
                    <p>${img.desc}</p>
                  </div>
                `).join('')}
              </div>

              <h3><i class="fas fa-music"></i> 代表作品</h3>
              <ul class="works-list">
                ${star.works.map(w => `<li>${w}</li>`).join('')}
              </ul>

              <div class="comments-section">
                <h3><i class="fas fa-comments"></i> 粉丝留言</h3>

                <div class="comment-form">
                  <h4>留下您的留言</h4>
                  <div class="form-group">
                    <input type="text" id="comment-author" placeholder="您的昵称 (可选)" maxlength="20">
                  </div>
                  <div class="form-group">
                    <textarea id="comment-content" placeholder="请输入留言内容..." rows="3" required></textarea>
                  </div>
                  <button id="submit-comment" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> 提交留言
                  </button>
                </div>

                <div class="comments-list" id="comments-list"></div>
              </div>
            </div>
          </div>
        `;

        // 图片：点击打开弹窗（script.js 里会接管切换/关闭）
        const galleryImgs = Array.from(document.querySelectorAll('.gallery-item img'));
        galleryImgs.forEach(img => img.addEventListener('click', () => window.openImageModal(img.src, img.alt, galleryImgs)));

        // 主头像也可点
        const mainImg = document.getElementById('main-star-img');
        mainImg.addEventListener('click', () => window.openImageModal(mainImg.src, mainImg.alt, [mainImg]));

        // 留言：初始化渲染 + 绑定事件
        loadComments();
        document.getElementById('submit-comment').addEventListener('click', submitComment);

        // 删除留言（事件委托）
        document.getElementById('comments-list').addEventListener('click', function (e) {
          const btn = e.target.closest('.delete-comment');
          if (!btn) return;
          const idx = Number(btn.dataset.index);
          if (Number.isNaN(idx)) return;
          comments.splice(idx, 1);
          loadComments();
        });

        // 简单 3D 悬停（可选美观，不影响功能）
        document.querySelectorAll('.gallery-item').forEach(card => {
          card.addEventListener('mousemove', function (e) {
            const r = card.getBoundingClientRect();
            const px = (e.clientX - r.left) / r.width;
            const py = (e.clientY - r.top) / r.height;
            const rx = (0.5 - py) * 6;
            const ry = (px - 0.5) * 8;
            card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateY(-2px)`;
          });
          card.addEventListener('mouseleave', () => card.style.transform = '');
        });
      }

      function loadComments() {
        const list = document.getElementById('comments-list');
        if (!list) return;

        if (comments.length === 0) {
          list.innerHTML = '<div class="no-comments">暂无留言，快来留下第一条吧！</div>';
          return;
        }

        list.innerHTML = comments.map((c, i) => `
          <div class="comment-item">
            <div class="comment-header">
              <div class="comment-author">
                <i class="fas fa-user-circle"></i>
                <span>${c.author}</span>
              </div>
              <button class="delete-comment" data-index="${i}" title="删除">删除</button>
            </div>
            <div class="comment-content">${c.content}</div>
          </div>
        `).join('');
      }

      function submitComment() {
        const authorInput = document.getElementById('comment-author');
        const contentInput = document.getElementById('comment-content');

        const content = contentInput.value.trim();
        if (!content) {
          alert('请输入留言内容！');
          contentInput.focus();
          return;
        }

        comments.unshift({
          author: authorInput.value.trim() || '匿名网友',
          content
        });

        authorInput.value = '';
        contentInput.value = '';

        loadComments();
      }

      loadStarInfo();
    });
  </script>
</body>
</html>
